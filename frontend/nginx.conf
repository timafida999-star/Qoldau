# Internal nginx for the Qoldau project. It is prefix-agnostic on purpose: it

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API, uploads, docs, and the chat WebSocket all live under /api and go to
    # the backend. The path is preserved (no trailing slash on proxy_pass), so
    # the backend receives "/api/...".
    location /api/ {
        proxy_pass http://qoldau-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade for /api/ws/...
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # SPA fallback — client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

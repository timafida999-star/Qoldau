# Production stack 
#
#   cp .env.example .env                 # compose vars (Postgres creds, base path)
#   cp backend/.env.example backend/.env # backend app config + secrets
name: qoldau

services:
  qoldau-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - qoldau_db_data:/var/lib/postgresql/data
    networks:
      - esg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qoldau-backend:
    build: ./backend
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    env_file:
      - ./backend/.env
    volumes:
      - qoldau_uploads:/app/uploads
    expose:
      - "8000"
    depends_on:
      qoldau-db:
        condition: service_healthy
    networks:
      - esg-network

  qoldau-web:
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - qoldau-backend
    networks:
      - esg-network

networks:
  esg-network:
    external: true

volumes:
  qoldau_db_data:
  qoldau_uploads:
